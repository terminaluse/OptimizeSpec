fixture_analysis_guidance: |
  Inspect the existing claude-gepa fixture before generating artifacts. Ground the plan in src/claude_gepa/candidate.py, src/claude_gepa/runtime.py, src/claude_gepa/evaluator.py, src/claude_gepa/optimizer.py, src/claude_gepa/tasks.py, and src/claude_gepa/cli.py. Name Claude Managed Agents, ManagedAgentRuntime, ManagedAgentEvaluator, optimize_demo, optimize_anything, and the dict[str, str] candidate boundary.
proposal_generation_guidance: |
  The proposal should identify Claude Managed Agents as the runtime, list candidate fields system_prompt, task_prompt, outcome_rubric, skills, environment_spec, and subagent_specs, include numeric scoring and qualitative rubric guidance, and define ASI as a first-class output.
design_generation_guidance: |
  The design should define direct eval, optimize, compare, and show candidate operations using eval-demo, optimize-demo, compare-demo, and show-seed as existing command references. It should describe the rollout lifecycle: candidate plus eval case, Managed Agent session, trace capture, scoring, side_info/ASI, persistence, and cleanup.
spec_task_generation_guidance: |
  Specs and tasks should cover candidate surface, eval dataset, scorer behavior, Managed Agent runner, ASI, GEPA optimization, apply skill behavior, validation, direct eval, and compare.
apply_generation_guidance: |
  The apply plan should reuse ManagedAgentRuntime and ManagedAgentEvaluator instead of duplicating runtime code. It should wire optimize_anything, expose direct eval, optimize, compare, and show candidate operations, require ANTHROPIC_API_KEY for live Managed Agents, and block unsupported runtimes.
scoring_asi_guidance: |
  Eval cases should include file-transform tasks, structured candidate validity checks, runtime failure checks, train and val splits, score semantics, side_info, field-specific ASI, numeric scoring, and qualitative rubric guidance.
