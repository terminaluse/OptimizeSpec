cases:
  - id: proposal-for-existing-agent
    split: train
    input: "Create the proposal artifact for the existing claude-gepa Managed Agent fixture."
    expected: "Claude Managed Agents, src/claude_gepa/runtime.py, src/claude_gepa/evaluator.py, dict[str, str], system_prompt, task_prompt, outcome_rubric, skills, environment_spec, subagent_specs, numeric scoring, qualitative rubric, ASI"
    scorer:
      type: custom
      expected: required_terms
    metadata:
      artifact_type: proposal
      required_terms:
        - Claude Managed Agents
        - src/claude_gepa/runtime.py
        - src/claude_gepa/evaluator.py
        - dict[str, str]
        - system_prompt
        - task_prompt
        - outcome_rubric
        - skills
        - environment_spec
        - subagent_specs
        - numeric scoring
        - qualitative rubric
        - ASI
      focus_fields:
        - fixture_analysis_guidance
        - proposal_generation_guidance
        - scoring_asi_guidance
  - id: design-for-existing-agent
    split: train
    input: "Create the design artifact for evals and GEPA optimization against the existing agent."
    expected: "ManagedAgentRuntime, ManagedAgentEvaluator, optimize_demo, eval-demo, optimize-demo, compare-demo, show-seed, rollout lifecycle, session, trace capture, side_info, cleanup"
    scorer:
      type: custom
      expected: required_terms
    metadata:
      artifact_type: design
      required_terms:
        - ManagedAgentRuntime
        - ManagedAgentEvaluator
        - optimize_demo
        - eval-demo
        - optimize-demo
        - compare-demo
        - show-seed
        - rollout lifecycle
        - session
        - trace capture
        - side_info
        - cleanup
      focus_fields:
        - fixture_analysis_guidance
        - design_generation_guidance
        - apply_generation_guidance
  - id: specs-tasks-for-existing-agent
    split: train
    input: "Create specs and tasks for applying a GEPA eval optimizer to the existing agent."
    expected: "candidate surface, eval dataset, scorer, Managed Agent runner, ASI, GEPA optimization, apply skill, validation, direct eval, compare"
    scorer:
      type: custom
      expected: required_terms
    metadata:
      artifact_type: specs_tasks
      required_terms:
        - candidate surface
        - eval dataset
        - scorer
        - Managed Agent runner
        - ASI
        - GEPA optimization
        - apply skill
        - validation
        - direct eval
        - compare
      focus_fields:
        - spec_task_generation_guidance
        - apply_generation_guidance
  - id: generated-eval-cases
    split: val
    input: "Create eval cases for the existing agent."
    expected: "file-transform tasks, structured candidate validity, runtime failure, train, val, score, side_info, field-specific"
    scorer:
      type: custom
      expected: required_terms
    metadata:
      artifact_type: eval_cases
      required_terms:
        - file-transform tasks
        - structured candidate validity
        - runtime failure
        - train
        - val
        - score
        - side_info
        - field-specific
      focus_fields:
        - scoring_asi_guidance
        - design_generation_guidance
  - id: generated-apply-plan
    split: val
    input: "Create an apply plan for this existing agent."
    expected: "reuse ManagedAgentRuntime, reuse ManagedAgentEvaluator, optimize_anything, direct eval, optimize, compare, show candidate, ANTHROPIC_API_KEY, unsupported runtimes"
    scorer:
      type: custom
      expected: required_terms
    metadata:
      artifact_type: apply_plan
      required_terms:
        - reuse ManagedAgentRuntime
        - reuse ManagedAgentEvaluator
        - optimize_anything
        - direct eval
        - optimize
        - compare
        - show candidate
        - ANTHROPIC_API_KEY
        - unsupported runtimes
      focus_fields:
        - apply_generation_guidance
        - fixture_analysis_guidance
  - id: end-to-end-optimization-loop
    split: test
    input: "Run the generated system end to end and verify it completes an optimization loop."
    expected: "SYSTEM_LOOP_SUCCESS"
    scorer:
      type: custom
      expected: system_loop_success
    metadata:
      artifact_type: system_loop
      required_terms:
        - SYSTEM_LOOP_SUCCESS
        - generate
        - eval
        - optimize
        - candidates.json
        - run_log.txt
      focus_fields:
        - apply_generation_guidance
        - scoring_asi_guidance
