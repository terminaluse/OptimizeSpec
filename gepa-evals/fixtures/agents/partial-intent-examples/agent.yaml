id: partial-intent-examples
name: partial-intent-examples
fixture_type: positive
runtime: Claude Managed Agents
description: Positive fixture where the user gives partial intent and examples, and the workflow should draft criteria with focused open questions.
source_files:
  runtime: src/agent_gepa/runtime.py
  cli: src/agent_gepa/cli.py
existing_commands:
  direct_eval: agent-gepa eval-demo
  optimize: agent-gepa optimize-demo --max-metric-calls 1
  compare: agent-gepa compare-demo --max-metric-calls 1
  show_candidate: agent-gepa show-seed
candidate_fields:
  - system_prompt
  - task_prompt
  - outcome_rubric
runtime_facts:
  - The user supplied examples but not a complete eval contract.
  - The skill should draft criteria and ask for confirmation or correction.
v1_constraints:
  - Keep the initial question count low and preserve unknowns.
expected_behavior:
  required_artifacts:
    - generated/proposal.md
    - generated/design.md
    - generated/specs/eval-validation-spec.md
    - generated/tasks.md
    - generated/eval-cases.yaml
    - generated/seed-candidate.yaml
    - generated/apply-plan.md
    - eval/summary.json
    - compare/comparison.json
    - optimize/candidates.json
    - optimize/run_log.txt
  semantic_checks:
    proposal:
      - target agent
      - eval objective
      - primary criterion
      - secondary criteria
      - guardrails
      - thresholds
      - draft eval contract
      - confirm or correct
      - focused open questions
    design:
      - eval category
      - real task distribution
      - edge cases
      - grading strategy
      - optimizer acceptance
      - direct eval
      - rollout lifecycle
    specs_tasks:
      - candidate surface
      - eval dataset
      - scorer
      - ASI
      - GEPA optimization
      - validation
    eval_cases:
      - train
      - val
      - criteria
      - grader
      - acceptance
    apply_plan:
      - runnable commands
      - direct eval
      - optimize
      - promotion rule
  live:
    requires_live: false
    required_env:
      - ANTHROPIC_API_KEY
