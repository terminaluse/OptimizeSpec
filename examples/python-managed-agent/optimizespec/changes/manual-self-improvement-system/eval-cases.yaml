cases:
  - id: echo-alpha
    split: train
    input: alpha
    expected: alpha
    scorer:
      type: exact_match
      expected: alpha
    metadata:
      criteria:
        category: agent-quality
        primary: Echo the input exactly.
        secondary:
          - Preserve exact characters.
        guardrails:
          - Do not add explanations.
      grader:
        type: deterministic
        rationale: Exact string equality is sufficient.
        calibration:
          - input: alpha
            expected_score: 1.0
        reliability_risks: []
        human_review_triggers: []
      acceptance:
        optimized_metric: correctness
        diagnostic_metrics:
          - latency_inv
          - cost_inv
        guardrail_metrics: []
        promotion_rule: Promote when validation correctness improves without errors.
        regression_tolerance: 0.0
