id: optimizespec-managed-agent
name: optimizespec-managed-agent
fixture_type: positive
runtime: Claude Managed Agents
description: Existing package prototype that optimizes Claude Managed Agents with GEPA optimize_anything.
source_files:
  candidate: examples/py-claude-managed-agent/src/optimizespec/candidate.py
  runtime: examples/py-claude-managed-agent/src/optimizespec/runtime.py
  evaluator: examples/py-claude-managed-agent/src/optimizespec/evaluator.py
  optimizer: examples/py-claude-managed-agent/src/optimizespec/optimizer.py
  tasks: examples/py-claude-managed-agent/src/optimizespec/tasks.py
  cli: examples/py-claude-managed-agent/src/optimizespec/cli.py
existing_commands:
  direct_eval: optimizespec eval-demo
  optimize: optimizespec optimize-demo
  compare: optimizespec compare-demo
  show_candidate: optimizespec show-seed
candidate_fields:
  - system_prompt
  - task_prompt
  - outcome_rubric
  - skills
  - environment_spec
  - subagent_specs
runtime_facts:
  - ManagedAgentRuntime creates Claude Managed Agents, Environments, Sessions, resources, and event streams.
  - ManagedAgentEvaluator returns score and side_info for GEPA.
  - CandidateBundle compiles dict[str, str] candidates into runtime behavior.
  - optimize_demo invokes GEPA optimize_anything with train and validation tasks.
  - Run artifacts include candidate snapshots, side_info, outputs, runtime IDs, usage, and errors.
v1_constraints:
  - Live runs require ANTHROPIC_API_KEY.
  - Multi-agent subagents require OPTIMIZESPEC_ENABLE_MULTI_AGENT=1 and Anthropic preview access.
  - Other agent runtimes are out of scope for the first eval-generation workflow.
expected_behavior:
  required_artifacts:
    - generated/proposal.md
    - generated/design.md
    - generated/specs/eval-validation-spec.md
    - generated/tasks.md
    - generated/eval-cases.yaml
    - generated/seed-candidate.yaml
    - generated/apply-plan.md
    - eval/summary.json
    - compare/comparison.json
    - optimize/candidates.json
    - optimize/run_log.txt
  semantic_checks:
    proposal:
      - target agent
      - Claude Managed Agents
      - eval objective
      - input
      - expected output
      - numeric scoring
      - qualitative rubric
      - primary criterion
      - secondary criteria
      - guardrails
      - thresholds
      - non-goals
      - blind spots
      - draft eval contract
      - confirm or correct
      - focused open questions
      - ASI
    design:
      - direct eval
      - rollout lifecycle
      - scorer
      - ASI
      - GEPA
      - compare
      - credentials
      - eval category
      - real task distribution
      - edge cases
      - failure modes
      - split strategy
      - what this eval does not measure
      - grading strategy
      - grader type
      - calibration examples
      - reliability risks
      - optimizer acceptance
      - optimized metric
      - diagnostic metrics
      - guardrail metrics
      - promotion rule
      - regression tolerance
    specs_tasks:
      - candidate surface
      - eval dataset
      - scorer
      - ASI
      - GEPA optimization
      - validation
    eval_cases:
      - train
      - val
      - input
      - expected
      - scorer
      - metadata
      - criteria
      - grader
      - acceptance
    apply_plan:
      - runnable commands
      - direct eval
      - optimize
      - compare
      - verify
      - unsupported runtimes
      - optimized metric
      - guardrail metrics
      - promotion rule
  live:
    requires_live: false
    required_env:
      - ANTHROPIC_API_KEY
